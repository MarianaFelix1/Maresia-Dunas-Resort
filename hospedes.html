<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hóspedes | Maresia Dunas Resort</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/hospedes.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>
<body>

<div class="container">

    <aside class="sidebar"></aside>

    <main>

        <header class="topbar">

            <div>
                <h1>Gestão de Hóspedes</h1>
                <p>Cadastro e gerenciamento de hóspedes</p>
            </div>

            <button id="novoHospede">
                <i class="ti ti-plus"></i>
                Novo Hóspede
            </button>

        </header>

        <div class="search-card">
            <i class="ti ti-search"></i>
            <input type="text" id="pesquisa" placeholder="Pesquisar por nome, CPF ou email...">
        </div>

        <div class="table-card">

            <table>

                <thead>
                    <tr>
                        <th>Hóspede</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaHospedes"></tbody>

            </table>

        </div>

    </main>

</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <h2 id="modalTitulo">Cadastrar Hóspede</h2>

        <input type="hidden" id="hospedeId">

        <label>Nome completo</label>
        <input type="text" id="nome" placeholder="Ex: Ana Souza">

        <label>CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00">

        <label>Telefone</label>
        <input type="text" id="telefone" placeholder="(00) 00000-0000">

        <label>Email</label>
        <input type="email" id="email" placeholder="nome@email.com">

        <div class="buttons">
            <button id="salvar">Salvar</button>
            <button id="fechar">Cancelar</button>
        </div>

    </div>
</div>

<script src="js/shell.js"></script>
<script src="js/hospedes.js"></script>

</body>
</html>
