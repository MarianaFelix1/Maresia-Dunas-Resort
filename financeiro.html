<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro | Maresia Dunas Resort</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/financeiro.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>
<body>

<div class="container">

    <aside class="sidebar"></aside>

    <main>

        <header class="topbar">
            <div>
                <h1>Financeiro</h1>
                <p>Receitas e despesas do resort</p>
            </div>

            <button id="novoLancamento">
                <i class="ti ti-plus"></i>
                Novo Lançamento
            </button>
        </header>

        <section class="stats">

            <div class="stat-card receita">
                <div class="icon"><i class="ti ti-trending-up"></i></div>
                <h2 id="totalReceitas">R$0,00</h2>
                <span>Receitas no período</span>
            </div>

            <div class="stat-card despesa">
                <div class="icon"><i class="ti ti-trending-down"></i></div>
                <h2 id="totalDespesas">R$0,00</h2>
                <span>Despesas no período</span>
            </div>

            <div class="stat-card saldo">
                <div class="icon"><i class="ti ti-wallet"></i></div>
                <h2 id="saldo">R$0,00</h2>
                <span>Saldo</span>
            </div>

        </section>

        <div class="filters">
            <select id="filtroTipo">
                <option value="">Todos os tipos</option>
                <option value="Receita">Receitas</option>
                <option value="Despesa">Despesas</option>
            </select>

            <input type="text" id="pesquisa" placeholder="Pesquisar por descrição...">
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Data</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="listaLancamentos"></tbody>
            </table>
        </div>

    </main>

</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <h2>Novo Lançamento</h2>

        <label>Descrição</label>
        <input type="text" id="descricao" placeholder="Ex: Hospedagem Suíte Oceano">

        <label>Categoria</label>
        <input type="text" id="categoria" placeholder="Ex: Hospedagem, Manutenção, Alimentos...">

        <label>Tipo</label>
        <select id="tipo">
            <option value="Receita">Receita</option>
            <option value="Despesa">Despesa</option>
        </select>

        <label>Valor (R$)</label>
        <input type="number" id="valor" placeholder="0.00" step="0.01" min="0">

        <label>Data</label>
        <input type="date" id="data">

        <div class="buttons">
            <button id="salvar">Salvar</button>
            <button id="fechar">Cancelar</button>
        </div>

    </div>
</div>

<script src="js/shell.js"></script>
<script src="js/financeiro.js"></script>

</body>
</html>
