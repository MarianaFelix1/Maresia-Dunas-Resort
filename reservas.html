<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reservas | Maresia Dunas Resort</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/reservas.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

</head>

<body>

<div class="container">

    <aside class="sidebar"></aside>

    <main>

        <header class="topbar">
            <div>
                <h1>Reservas</h1>
                <p>Controle de reservas do resort</p>
            </div>

            <button id="novaReserva">
                <i class="ti ti-plus"></i>
                Nova Reserva
            </button>
        </header>

        <section class="stats">
            <div class="stat-card">
                <h2 id="totalReservas">0</h2>
                <span>Total</span>
            </div>

            <div class="stat-card">
                <h2 id="ativas">0</h2>
                <span>Ativas</span>
            </div>

            <div class="stat-card">
                <h2 id="checkin">0</h2>
                <span>Check-in Hoje</span>
            </div>

            <div class="stat-card">
                <h2 id="checkout">0</h2>
                <span>Check-out Hoje</span>
            </div>
        </section>

        <div class="reservas-grid" id="reservasGrid"></div>

    </main>

</div>

<div class="modal" id="modal">
    <div class="modal-content">

        <h2 id="modalTitulo">Nova Reserva</h2>

        <input type="hidden" id="reservaId">

        <label>Nome do hóspede</label>
        <select id="hospede">
            <option value="">Selecione um hóspede...</option>
        </select>

        <label>Quarto</label>
        <select id="quarto">
            <option value="">Selecione um quarto...</option>
        </select>

        <label>Quantidade de pessoas</label>
        <input type="number" id="pessoas" min="1" value="1">
        <span class="hint" id="capacidadeHint"></span>

        <label>Status</label>
        <select id="statusReserva">
            <option>Ativa</option>
            <option>Check-in Hoje</option>
            <option>Check-out Hoje</option>
        </select>

        <label>Data de entrada</label>
        <input type="date" id="entrada">

        <label>Data de saída</label>
        <input type="date" id="saida">

        <div class="buttons">
            <button id="salvar">Salvar Reserva</button>
            <button id="fechar">Cancelar</button>
        </div>

    </div>
</div>
<div class="modal" id="modalConsumo">
    <div class="modal-content" style="max-width: 600px;">
        <h2><i class="ti ti-shopping-cart"></i> Consumo da Reserva</h2>
        <p class="desc" id="consumoSubtitulo" style="color: var(--text-muted); margin-bottom: 1rem;"></p>
        
        <input type="hidden" id="consumoReservaId">

        <div style="background: rgba(0,0,0,0.03); padding: 12px; border-radius: 8px; margin-bottom: 15px;">
            <h4 style="margin-bottom: 8px;">Lançar Novo Item</h4>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; align-items: end;">
                <div>
                    <label style="font-size: 11px;">Descrição do Item</label>
                    <input type="text" id="consItem" placeholder="Ex: Água sem gás 500ml" style="margin:0;">
                </div>
                <div>
                    <label style="font-size: 11px;">Qtd</label>
                    <input type="number" id="consQtd" min="1" value="1" style="margin:0;">
                </div>
                <div>
                    <label style="font-size: 11px;">Valor Unit. (R$)</label>
                    <input type="number" id="consValor" placeholder="0.00" step="0.01" min="0" style="margin:0;">
                </div>
            </div>
            <button id="btnLancarConsumo" class="btn-primary" style="width: 100%; margin-top: 10px; padding: 8px;">
                <i class="ti ti-plus"></i> Lançar no Frigobar
            </button>
        </div>

        <div style="max-height: 200px; overflow-y: auto; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; margin-bottom: 15px;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                <thead style="background: rgba(0,0,0,0.05); position: sticky; top: 0;">
                    <tr>
                        <th style="padding: 8px; text-align: left;">Item</th>
                        <th style="padding: 8px; text-align: center;">Qtd</th>
                        <th style="padding: 8px; text-align: right;">Unit.</th>
                        <th style="padding: 8px; text-align: right;">Total</th>
                    </tr>
                </thead>
                <tbody id="listaConsumosCorrentes">
                    </tbody>
            </table>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 16px; border-top: 2px dashed rgba(0,0,0,0.1); padding-top: 10px;">
            <span>Total Consumido:</span>
            <span id="totalConsumoAcumulado" style="color: #e67e22;">R$ 0,00</span>
        </div>

        <div class="buttons" style="margin-top: 20px;">
            <button id="fecharConsumo" class="btn-secondary" style="width: 100%;">Fechar Painel</button>
        </div>
    </div>
</div>
<script src="js/shell.js"></script>
<script src="js/reservas.js"></script>

</body>
</html>
